apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-root
  namespace: argocd
spec:
  project: yas
  source:
    repoURL: https://github.com/ducquan19/yas-gitops.git
    targetRevision: main
    path: argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
