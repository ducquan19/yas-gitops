apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: yas
  namespace: argocd
spec:
  description: YAS GitOps project for multi-cluster deployment

  sourceRepos:
    - https://github.com/ducquan19/yas-gitops.git

  destinations:
    - namespace: yas-dev
      server: https://kubernetes.default.svc
    - namespace: yas-staging
      server: https://kubernetes.default.svc
    - namespace: yas-dev
      server: https://100.84.105.114:8443
    - namespace: yas-staging
      server: https://100.84.105.114:8443
    - namespace: yas-dev
      server: https://100.122.97.48:32801
    - namespace: yas-staging
      server: https://100.122.97.48:32801
    - namespace: yas-dev
      server: https://100.65.39.31:50983
    - namespace: yas-staging
      server: https://100.65.39.31:50983

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
