apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-keycloak
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: "quay.io/keycloak/keycloak:26.0.2"
        command: ["/opt/keycloak/bin/kc.sh", "start-dev", "--import-realm"]
        ports:
        - containerPort: 8080
        env:
        - name: KC_DB
          value: "postgres"
        - name: KC_DB_URL
          value: "jdbc:postgresql://infra-postgresql:5432/keycloak"
        - name: KC_DB_USERNAME
          value: "admin"
        - name: KC_DB_PASSWORD
          value: "admin"
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin"
        - name: KC_HTTP_ENABLED
          value: "true"
        # KC_HOSTNAME cho phép Keycloak trả về URL công khai (identity)
        # trong OIDC discovery endpoint (.well-known/openid-configuration).
        # Điều này rất quan trọng: browser cần URL này để redirect đến trang login.
        - name: KC_HOSTNAME
          value: "identity"
        - name: KC_HOSTNAME_PORT
          value: "31080"
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HOSTNAME_STRICT_HTTPS
          value: "false"
        - name: KC_PROXY
          value: "edge"
        volumeMounts:
        - name: realm-import
          mountPath: /opt/keycloak/data/import/realm-export.json
          subPath: realm-export.json
      volumes:
      - name: realm-import
        configMap:
          name: infra-keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: infra-keycloak
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: 8080
    nodePort: 31080
  - name: internal-31080
    port: 31080
    targetPort: 8080
  selector:
    app: keycloak
