apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-keycloak
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: "quay.io/keycloak/keycloak:26.0.2"
        command: ["/opt/keycloak/bin/kc.sh", "start-dev"]
        ports:
        - containerPort: 8080
        env:
        - name: KC_DB
          value: "postgres"
        - name: KC_DB_URL
          value: "jdbc:postgresql://infra-postgresql:5432/keycloak"
        - name: KC_DB_USERNAME
          value: "admin"
        - name: KC_DB_PASSWORD
          value: "admin"
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin"
        - name: KC_HTTP_ENABLED
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: infra-keycloak
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
  selector:
    app: keycloak
