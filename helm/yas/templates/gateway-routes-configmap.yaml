apiVersion: v1
kind: ConfigMap
metadata:
  name: yas-gateway-routes-config
  namespace: {{ .Release.Namespace }}
data:
  gateway-routes.yaml: |
    spring:
      cloud:
        gateway:
          default-filters:
            - SaveSession
          routes:
            - id: api
              uri: http://localhost:8082
              order: -1
              predicates:
                - Path=/disabled-api-route/**
            - id: product_api
              uri: http://product:8082
              order: -1
              predicates:
                - Path=/api/product/**
              filters:
                - StripPrefix=1
            - id: location_api
              uri: http://location:8082
              order: -1
              predicates:
                - Path=/api/location/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: inventory_api
              uri: http://inventory:8082
              order: -1
              predicates:
                - Path=/api/inventory/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: cart_api
              uri: http://cart:8082
              order: -1
              predicates:
                - Path=/api/cart/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: customer_api
              uri: http://customer:8082
              order: -1
              predicates:
                - Path=/api/customer/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: payment_api
              uri: http://payment:8082
              order: -1
              predicates:
                - Path=/api/payment/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: media_api
              uri: http://media:8082
              order: -10
              predicates:
                - Path=/api/media/{*segment}
              filters:
                - SetPath=/{segment}
            - id: rating_api
              uri: http://rating:8082
              order: -1
              predicates:
                - Path=/api/rating/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: tax_api
              uri: http://tax:8082
              order: -1
              predicates:
                - Path=/api/tax/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: promotion_api
              uri: http://promotion:8082
              order: -1
              predicates:
                - Path=/api/promotion/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: search_api
              uri: http://search:8082
              order: -1
              predicates:
                - Path=/api/search/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: order_api
              uri: http://order:8082
              order: -1
              predicates:
                - Path=/api/order/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: recommendation_api
              uri: http://recommendation:8082
              order: -1
              predicates:
                - Path=/api/recommendation/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: webhook_api
              uri: http://webhook:8082
              order: -1
              predicates:
                - Path=/api/webhook/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
                - TokenRelay=
            - id: sampledata_api
              # sampledata listens on port 8094 (server.port=8094 in application.properties)
              uri: http://sampledata:8094
              order: -1
              predicates:
                - Path=/api/sampledata/**
              filters:
                - RewritePath=/api/(?<segment>.*), /$\{segment}
            - id: openapi
              uri: forward:///v3/api-docs
              order: -1
              predicates:
                - Path=/v3/api-docs/**
            - id: ui
              uri: ${UI_HOST}
              predicates:
                - Path=/**
