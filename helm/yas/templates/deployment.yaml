{{- range $serviceName, $serviceConfig := .Values }}
{{- if typeIs "map[string]interface {}" $serviceConfig }}
{{- if hasKey $serviceConfig "enabled" }}
{{- if and (eq $serviceConfig.enabled true) (hasKey $serviceConfig "image") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $serviceConfig.syncWave | default "1" | quote }}
  labels:
    app: {{ $serviceName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $serviceName }}
  template:
    metadata:
      labels:
        app: {{ $serviceName }}
    spec:
      serviceAccountName: {{ $serviceName }}-sa
      {{- if or $serviceConfig.isBackend $serviceConfig.extraVolumes }}
      volumes:
        {{- if $serviceConfig.isBackend }}
        - name: yas-configuration
          configMap:
            name: yas-configuration-configmap
        - name: otel-agent
          emptyDir: {}
        {{- if contains "bff" $serviceName }}
        - name: yas-gateway-routes-config
          configMap:
            name: yas-gateway-routes-config
        {{- end }}
        {{- end }}
        {{- with $serviceConfig.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if or $serviceConfig.isBackend $serviceConfig.initContainers }}
      initContainers:
        {{- if $serviceConfig.isBackend }}
        - name: otel-javaagent
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - curl -fsSL -o /otel/opentelemetry-javaagent.jar https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.6.0/opentelemetry-javaagent.jar
          volumeMounts:
            - name: otel-agent
              mountPath: /otel
        {{- end }}
        {{- with $serviceConfig.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ $serviceName }}
          image: "{{ $serviceConfig.image.repository }}:{{ $serviceConfig.image.tag }}"
          imagePullPolicy: Always
          {{- if $serviceConfig.service }}
          ports:
            - containerPort: {{ default $serviceConfig.service.port $serviceConfig.image.containerPort }}
          {{- end }}
          {{- if or $serviceConfig.isBackend $serviceConfig.extraVolumeMounts }}
          volumeMounts:
            {{- if $serviceConfig.isBackend }}
            - mountPath: /opt/yas/config
              name: yas-configuration
            - mountPath: /otel
              name: otel-agent
            {{- if contains "bff" $serviceName }}
            - mountPath: /opt/yas/gateway-routes-config
              name: yas-gateway-routes-config
            {{- end }}
            {{- end }}
            {{- with $serviceConfig.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml $serviceConfig.resources | nindent 12 }}
          {{- if or $serviceConfig.env $serviceConfig.secrets $serviceConfig.isBackend }}
          envFrom:
            {{- if $serviceConfig.isBackend }}
            - secretRef:
                name: yas-postgresql-credentials-secret
            {{- end }}
            {{- if $serviceConfig.env }}
            - configMapRef:
                name: {{ $serviceName }}-config
            {{- end }}
            {{- if $serviceConfig.secrets }}
            - secretRef:
                name: {{ $serviceName }}-secret
            {{- end }}
          {{- end }}
          {{- if $serviceConfig.isBackend }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_PORT
              value: {{ $serviceConfig.service.port | quote }}
            - name: LOGGING_CONFIG
              value: /opt/yas/config/logback.xml
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://infra-postgresql.infrastructure.svc.cluster.local:5432/{{ $serviceName }}
            - name: SPRING_CONFIG_IMPORT
              value: optional:file:/opt/yas/config/application.yaml{{- if contains "bff" $serviceName }},optional:file:/opt/yas/gateway-routes-config/gateway-routes.yaml{{- end }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: https://identity.{{ $.Values.global.domain | default "yas.io" }}/realms/Yas
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: http://infra-keycloak.infrastructure.svc.cluster.local/realms/Yas/protocol/openid-connect/certs
            - name: JAVA_TOOL_OPTIONS
              value: "--add-opens=java.base/java.lang=ALL-UNNAMED -javaagent:/otel/opentelemetry-javaagent.jar"
            - name: OTEL_SERVICE_NAME
              value: {{ $serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://opentelemetry-collector.observability:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: OTEL_JAVAAGENT_DEBUG
              value: "true"
            {{- if contains "bff" $serviceName }}
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: http://localhost:8082
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0
              value: Path=/disabled-api-route/**
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_ID
              value: cart_api_direct
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: http://cart:8082
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_ORDER
              value: "-100"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0
              value: Path=/api/cart/**
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_FILTERS_0
              value: StripPrefix=1
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_FILTERS_1
              value: TokenRelay=
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_ID
              value: customer_api_direct
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_URI
              value: http://customer:8082
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_ORDER
              value: "-100"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0
              value: Path=/api/customer/**
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_0
              value: StripPrefix=1
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_1
              value: TokenRelay=
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_ID
              value: sampledata_api_direct
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_URI
              value: http://sampledata:8094
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_ORDER
              value: "-100"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0
              value: Path=/api/sampledata/**
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_FILTERS_0
              value: RewritePath=/api/(?<segment>.*),/$\{segment}
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "*"
            {{- end }}
            {{- if eq $serviceName "storefront-bff" }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_PROVIDER
              value: keycloak
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID
              value: storefront-bff
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET
              value: ZrU9I0q2uXBglBnmvyJdkl1lf0ncr8tn
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_AUTHORIZATION_GRANT_TYPE
              value: authorization_code
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_SCOPE
              value: openid,profile,email,roles
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_REDIRECT_URI
              value: "{baseUrl}/login/oauth2/code/{registrationId}"
            {{- end }}
            {{- if eq $serviceName "backoffice-bff" }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_API_CLIENT_PROVIDER
              value: keycloak
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_API_CLIENT_CLIENT_ID
              value: backoffice-bff
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_API_CLIENT_CLIENT_SECRET
              value: TVacLC0cQ8tiiEKiTVerTb2YvwQ1TRJF
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_API_CLIENT_AUTHORIZATION_GRANT_TYPE
              value: authorization_code
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_API_CLIENT_SCOPE
              value: openid,profile,email,roles
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_API_CLIENT_REDIRECT_URI
              value: "{baseUrl}/login/oauth2/code/{registrationId}"
            {{- end }}
            {{- if $serviceConfig.uiHost }}
            - name: UI_HOST
              value: {{ $serviceConfig.uiHost | quote }}
            {{- end }}
          {{- else }}
          env:
            - name: HOSTNAME
              value: 0.0.0.0
          {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
