apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: nginx-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-ingress
  template:
    metadata:
      labels:
        app: nginx-ingress
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-ingress-config
---
# NodePort 30090 — ánh xạ port 80 public về Nginx pod.
# Các thành viên cần chạy lệnh sau trên máy local (Windows) để dùng port 80:
#   netsh interface portproxy add v4tov4 listenport=80 listenaddress=0.0.0.0 connectport=30090 connectaddress=100.91.182.4
# HOẶC chỉnh /etc/hosts bao gồm port như:
#   (không hỗ trợ port trong hosts) → cần portproxy hoặc kubectl port-forward
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: nginx-ingress
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30090
  selector:
    app: nginx-ingress
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-ingress-config
  namespace: {{ .Release.Namespace }}
data:
  default.conf: |
    # ================================================================
    # Nginx Ingress — YAS single-cluster (tdquan) deployment
    #
    # /etc/hosts trên máy người dùng:
    #   100.91.182.4  storefront.yas.local backoffice.yas.local api.yas.local identity
    #
    # Sau khi chạy portproxy (Windows) hoặc socat (Linux/Mac):
    #   Port 80  → NodePort 30090 (Nginx Ingress này)
    #   Port 30080 → Keycloak (trực tiếp, không qua Nginx)
    # ================================================================

    # storefront.yas.local → storefront-bff (Spring Cloud Gateway + OAuth2 Client)
    # BFF xử lý session, OAuth2, rồi route ngược về storefront-nextjs (UI_HOST)
    server {
      listen 80;
      server_name storefront.yas.local;
      location /api/media/ {
        limit_except GET HEAD {
          deny all;
        }
        proxy_pass         http://media:8082/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
      }
      location / {
        proxy_pass         http://storefront-bff:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
      }
    }

    # backoffice.yas.local → backoffice-bff
    server {
      listen 80;
      server_name backoffice.yas.local;
      location / {
        proxy_pass         http://backoffice-bff:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
      }
    }

    # api.yas.local → storefront-bff (dùng cho Swagger UI và API call trực tiếp)
    server {
      listen 80;
      server_name api.yas.local;
      location /api/media/ {
        limit_except GET HEAD {
          deny all;
        }
        proxy_pass         http://media:8082/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
      }
      location / {
        proxy_pass         http://storefront-bff:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
      }
    }
