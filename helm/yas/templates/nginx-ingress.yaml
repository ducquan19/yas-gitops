apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yas-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - storefront.{{ .Values.global.domain | default "yas.io" }}
        - backoffice.{{ .Values.global.domain | default "yas.io" }}
        - api.{{ .Values.global.domain | default "yas.io" }}
        - identity.{{ .Values.global.domain | default "yas.io" }}
      secretName: yas-tls-secret
  rules:
    - host: storefront.{{ .Values.global.domain | default "yas.io" }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: storefront-bff
                port:
                  number: 8082
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: storefront-bff
                port:
                  number: 8082
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: storefront-bff
                port:
                  number: 8082
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront-nextjs
                port:
                  number: 3000
    - host: backoffice.{{ .Values.global.domain | default "yas.io" }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backoffice-bff
                port:
                  number: 8082
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: backoffice-bff
                port:
                  number: 8082
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: backoffice-bff
                port:
                  number: 8082
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backoffice-nextjs
                port:
                  number: 3000
    - host: api.{{ .Values.global.domain | default "yas.io" }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: storefront-bff
                port:
                  number: 8082
          - path: /storefront
            pathType: Prefix
            backend:
              service:
                name: storefront-bff
                port:
                  number: 8082
          - path: /backoffice
            pathType: Prefix
            backend:
              service:
                name: backoffice-bff
                port:
                  number: 8082
    - host: identity.{{ .Values.global.domain | default "yas.io" }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infra-keycloak
                port:
                  number: 80
