apiVersion: v1
kind: ConfigMap
metadata:
  name: yas-configuration-configmap
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    server:
      shutdown: graceful
      port: 80

    management:
      otlp:
        tracing:
          endpoint: http://opentelemetry-collector.observability:4318/v1/traces
      server:
        port: 8090
      health:
        readinessstate:
          enabled: true
        livenessstate:
          enabled: true
      tracing:
        sampling:
          probability: 1.0
      metrics:
        tags:
          application: ${spring.application.name}
      endpoints:
        web:
          exposure:
            include: prometheus, health
      endpoint:
        health:
          probes:
            enabled: true
          show-details: always

    logging:
      pattern:
        level: application=${spring.application.name} traceId=%X{traceId:-} spanId=%X{spanId:-} level=%level

    spring:
      lifecycle:
        timeout-per-shutdown-phase: 30s
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: http://identity.yas.local.com/realms/Yas

      datasource:
        username: admin
        password: admin
      kafka:
        bootstrap-servers: infrastructure-kafka:9092
      data:
        redis:
          host: infrastructure-redis-master
          port: 6379
      elasticsearch:
        uris: http://infrastructure-elasticsearch:9200
    springdoc:
      oauthflow:
        authorization-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
        token-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/token

    yas:
      services:
        cart: http://cart:8082/cart
        customer: http://customer:8082/customer
        inventory: http://inventory:8082/inventory
        location: http://location:8082/location
        media: http://media:8082/media
        order: http://order:8082/order
        payment: http://payment:8082/payment
        payment-paypal: http://payment-paypal:8082/payment-paypal
        product: http://product:8082/product
        promotion: http://promotion:8082/promotion
        rating: http://rating:8082/rating
        search: http://search:8082/search
        tax: http://tax:8082/tax
        sampledata: http://sampledata:8082/sampledata
        recommendation: http://recommendation:8082/recommendation

  logback.xml: |
    <?xml version="1.0" encoding="UTF-8" ?>
    <Configuration>
        <include resource="org/springframework/boot/logging/logback/defaults.xml" />
        <include resource="org/springframework/boot/logging/logback/console-appender.xml" />
        <property name="LOG_LEVEL" value="${LOG_LEVEL:-INFO}"/>
        <root level="INFO">
            <appender-ref ref="CONSOLE" />
        </root>
        <logger name="com.yas" level="${LOG_LEVEL}" additivity="false">
            <appender-ref ref="CONSOLE" />
        </logger>
    </Configuration>
