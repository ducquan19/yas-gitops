apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yas-logout-storefront
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/permanent-redirect: https://identity.{{ .Values.global.domain | default "yas.io" }}/realms/Yas/protocol/openid-connect/logout?client_id=storefront-bff&post_logout_redirect_uri=https://storefront.{{ .Values.global.domain | default "yas.io" }}/
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - storefront.{{ .Values.global.domain | default "yas.io" }}
      secretName: yas-tls-secret
  rules:
    - host: storefront.{{ .Values.global.domain | default "yas.io" }}
      http:
        paths:
          - path: /login
            pathType: Exact
            backend:
              service:
                name: storefront-bff
                port:
                  number: 8082
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yas-logout-backoffice
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/permanent-redirect: https://identity.{{ .Values.global.domain | default "yas.io" }}/realms/Yas/protocol/openid-connect/logout?client_id=backoffice-bff&post_logout_redirect_uri=https://backoffice.{{ .Values.global.domain | default "yas.io" }}/oauth2/authorization/api-client
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - backoffice.{{ .Values.global.domain | default "yas.io" }}
      secretName: yas-tls-secret
  rules:
    - host: backoffice.{{ .Values.global.domain | default "yas.io" }}
      http:
        paths:
          - path: /logout
            pathType: Exact
            backend:
              service:
                name: backoffice-bff
                port:
                  number: 8082
