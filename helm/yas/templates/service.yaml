{{- range $serviceName, $serviceConfig := .Values }}
{{- if typeIs "map[string]interface {}" $serviceConfig }}
{{- if hasKey $serviceConfig "enabled" }}
{{- if and (eq $serviceConfig.enabled true) (hasKey $serviceConfig "image") }}
{{- if $serviceConfig.service }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $serviceName }}
spec:
  type: {{ $serviceConfig.service.type | default "NodePort" }}
  selector:
    app: {{ $serviceName }}
  ports:
    - protocol: TCP
      name: http
      port: {{ $serviceConfig.service.port | default (default 8082 $serviceConfig.image.containerPort) }}
      targetPort: {{ $serviceConfig.service.port | default (default 8082 $serviceConfig.image.containerPort) }}
      {{- if $serviceConfig.service.nodePort }}
      nodePort: {{ $serviceConfig.service.nodePort }}
      {{- end }}
    {{- if $serviceConfig.isBackend }}
    - protocol: TCP
      name: management
      port: 8090
      targetPort: 8090
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
