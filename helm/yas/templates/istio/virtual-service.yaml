{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: yas-virtual-service
  namespace: {{ $.Release.Namespace }}
spec:
  hosts:
    - "*"
  gateways:
    - yas-gateway
  http:
    # Route for storefront-bff
    - match:
        - uri:
            prefix: /storefront-bff
      route:
        - destination:
            host: storefront-bff
            port:
              number: 8082
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,connect-failure

    # Route for backoffice-bff
    - match:
        - uri:
            prefix: /backoffice-bff
      route:
        - destination:
            host: backoffice-bff
            port:
              number: 8082
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,connect-failure

---
# Internal retry policy for order service
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: order-internal-route
  namespace: {{ $.Release.Namespace }}
spec:
  hosts:
    - order
  http:
    - route:
        - destination:
            host: order
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,connect-failure

---
# Internal retry policy for tax service
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: tax-internal-route
  namespace: {{ $.Release.Namespace }}
spec:
  hosts:
    - tax
  http:
    - route:
        - destination:
            host: tax
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,connect-failure
{{- end }}
