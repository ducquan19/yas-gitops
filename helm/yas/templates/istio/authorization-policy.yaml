{{- if .Values.istio.enabled }}

# 2a. Cho phép tất cả traffic vào storefront-bff (public endpoint qua nginx)
#     Nginx ingress không có Istio sidecar nên không thể dùng source.namespaces/principals
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-storefront-bff
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: storefront-bff
  action: ALLOW
  rules:
  - {} # Allow all — nginx ingress không có sidecar, không thể xác thực namespace

---
# 2b. Cho phép tất cả traffic vào backoffice-bff (public endpoint qua nginx)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-backoffice-bff
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: backoffice-bff
  action: ALLOW
  rules:
  - {} # Allow all — nginx ingress không có sidecar

---
# 2c. Cho phép tất cả traffic vào storefront-nextjs (public UI)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-storefront-nextjs
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: storefront-nextjs
  action: ALLOW
  rules:
  - {} # Allow all — public UI endpoint

---
# 2d. Cho phép tất cả traffic vào backoffice-nextjs (public UI)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-backoffice-nextjs
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: backoffice-nextjs
  action: ALLOW
  rules:
  - {} # Allow all — public UI endpoint

---
# 2e. Cho phép nginx ingress trực tiếp vào các microservices (openapi-ingress bypass BFF)
{{- range $svcName := list "product" "cart" "order" "customer" "media" "inventory" "tax" "sampledata" "payment" "rating" "recommendation" "location" }}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-{{ $svcName }}
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ $svcName }}
  action: ALLOW
  rules:
  - {} # Allow all — swagger UI (v3/api-docs) và public APIs cần public accessible
{{- end }}

---
# 2f. Cho phép nginx ingress trực tiếp vào swagger (yas-swagger-ingress bypass BFF)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-swagger
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: swagger
  action: ALLOW
  rules:
  - {} # Allow all — swagger UI cần public accessible

---
# 3. Cho phép BFF gọi vào Core Microservices — một policy per service
{{- range $svcName := list "product" "cart" "order" "customer" "media" "inventory" "search" "tax" "sampledata" "payment" "rating" "recommendation" "location" }}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-bff-to-{{ $svcName }}
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ $svcName }}
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/storefront-bff-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/backoffice-bff-sa"
          # Internal service-to-service
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/order-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/cart-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/product-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/customer-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/inventory-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/tax-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/media-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/location-sa"
{{- end }}
{{- end }}
