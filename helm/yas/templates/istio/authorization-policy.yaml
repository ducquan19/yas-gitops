{{- if .Values.istio.enabled }}
---
# 1. Mặc định CHẶN tất cả (Default Deny) trong namespace
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: default-deny-all
  namespace: {{ $.Release.Namespace }}
spec:
  {} # Không có allow rule nào -> Chặn tất cả

---
# 2a. Cho phép tất cả traffic vào storefront-bff (public endpoint qua nginx)
#     Nginx ingress không có Istio sidecar nên không thể dùng source.namespaces/principals
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-storefront-bff
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: storefront-bff
  action: ALLOW
  rules:
  - {} # Allow all — nginx ingress không có sidecar, không thể xác thực namespace

---
# 2b. Cho phép tất cả traffic vào backoffice-bff (public endpoint qua nginx)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-backoffice-bff
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: backoffice-bff
  action: ALLOW
  rules:
  - {} # Allow all — nginx ingress không có sidecar

---
# 2c. Cho phép tất cả traffic vào storefront-nextjs (public UI)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-storefront-nextjs
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: storefront-nextjs
  action: ALLOW
  rules:
  - {} # Allow all — public UI endpoint

---
# 2d. Cho phép tất cả traffic vào backoffice-nextjs (public UI)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-backoffice-nextjs
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: backoffice-nextjs
  action: ALLOW
  rules:
  - {} # Allow all — public UI endpoint

---
# 2e. Cho phép nginx ingress trực tiếp vào product (yas-public-api-ingress bypass BFF)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-product
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: product
  action: ALLOW
  rules:
  - {} # Allow all — product được expose trực tiếp qua public-api-ingress

---
# 2f. Cho phép nginx ingress trực tiếp vào search (yas-public-api-ingress bypass BFF)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-search
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: search
  action: ALLOW
  rules:
  - {} # Allow all — search được expose trực tiếp qua public-api-ingress

---
# 2g. Cho phép nginx ingress trực tiếp vào sampledata
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-sampledata
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: sampledata
  action: ALLOW
  rules:
  - {} # Allow all — sampledata cần accessible từ BFF qua nginx workaround

---
# 2h. Cho phép nginx ingress trực tiếp vào media (yas-media-ingress bypass BFF)
#     Browser load ảnh trực tiếp qua /api/media/** → media:8082
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-media
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: media
  action: ALLOW
  rules:
  - {} # Allow all — media images phải public accessible

---
# 3. Cho phép BFF gọi vào Core Microservices — một policy per service
{{- range $svcName := list "product" "cart" "order" "customer" "media" "inventory" "search" "tax" "sampledata" "payment" "rating" "recommendation" "location" }}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-bff-to-{{ $svcName }}
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ $svcName }}
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/storefront-bff-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/backoffice-bff-sa"
          # Internal service-to-service
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/order-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/cart-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/product-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/customer-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/inventory-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/tax-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/media-sa"
          - "cluster.local/ns/{{ $.Release.Namespace }}/sa/location-sa"
{{- end }}
{{- end }}
