global:
  keycloak:
    issuerUri: http://infra-keycloak.infrastructure.svc.cluster.local/realms/Yas
  postgresql:
    username: admin
    password: admin
  kafka:
    bootstrapServers: infra-kafka.infrastructure.svc.cluster.local:9092
  redis:
    host: infra-redis.infrastructure.svc.cluster.local
    port: 6379
  elasticsearch:
    uris: http://infra-elasticsearch.infrastructure.svc.cluster.local:9200
storefront-nextjs:
  syncWave: 7
  enabled: true
  image:
    repository: ducquan19/yas-storefront
    tag: latest
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: ClusterIP
    port: 3000
  env:
    NEXT_PUBLIC_API_BASE_PATH: https://storefront.yas.io
    API_BASE_PATH: http://storefront-bff:8082/api
storefront-bff:
  syncWave: 6
  enabled: true
  image:
    repository: ducquan19/yas-storefront-bff
    tag: latest
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: ClusterIP
    port: 8082
  uiHost: https://storefront.yas.io
  isBackend: true
