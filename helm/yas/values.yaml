    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: ClusterIP
    port: 8094
  env:
    SPRING_DATASOURCE_PRODUCT_URL: jdbc:postgresql://infra-postgresql.infrastructure.svc.cluster.local:5432/product
    SPRING_DATASOURCE_MEDIA_URL: jdbc:postgresql://infra-postgresql.infrastructure.svc.cluster.local:5432/media
    SPRING_DATASOURCE_USERNAME: admin
    SPRING_DATASOURCE_PASSWORD: admin
    SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
    SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://identity.yas.io/realms/Yas
    CORS_ALLOWED_ORIGINS: https://storefront.yas.io,https://backoffice.yas.io
swagger:
  syncWave: 7
  enabled: true
  image:
    repository: swaggerapi/swagger-ui
    tag: v5.17.14
    containerPort: 8080
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: ClusterIP
    port: 8080
  env:
    URLS: '[{ url: ''https://api.yas.io/product/v3/api-docs'', name: ''Product'' },{
      url: ''https://api.yas.io/media/v3/api-docs'', name: ''Media'' },{ url: ''https://api.yas.io/customer/v3/api-docs'',
      name: ''Customer'' },{ url: ''https://api.yas.io/cart/v3/api-docs'', name: ''Cart''
      },{ url: ''https://api.yas.io/order/v3/api-docs'', name: ''Order'' },{ url:
      ''https://api.yas.io/inventory/v3/api-docs'', name: ''Inventory'' },{ url: ''https://api.yas.io/location/v3/api-docs'',
      name: ''Location'' },{ url: ''https://api.yas.io/tax/v3/api-docs'', name: ''Tax''
      },{ url: ''https://api.yas.io/search/v3/api-docs'', name: ''Search'' },{ url:
      ''https://api.yas.io/payment/v3/api-docs'', name: ''Payment'' }]'
    OAUTH_CLIENT_ID: swagger-ui
    OAUTH_USE_PKCE: 'true'
