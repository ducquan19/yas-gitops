global:
  keycloak:
    issuerUri: http://infra-keycloak/realms/Yas
  postgresql:
    username: admin
    password: admin
  kafka:
    bootstrapServers: infra-kafka:9092
  redis:
    host: infra-redis-master
    port: 6379
  elasticsearch:
    uris: http://infra-elasticsearch:9200

storefront-nextjs:
  syncWave: 7
  enabled: false
  image:
    repository: ducquan19/yas-storefront
    tag: main
    containerPort: 3000
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: NodePort
    port: 3000
    nodePort: 30001
  env: {}
  secrets: {}

