{{- if .Values.istio.enabled }}
---
# 1. DEFAULT DENY
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.namespace }}
  annotations:
    description: "Default deny all — no rules means block everything"
spec: {}

{{- range $name, $config := .Values.services }}
{{- if $config.allowedCallers }}
---
# ALLOW TO {{ $name }}
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-{{ $name }}
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    matchLabels:
      app: {{ $name }}
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
            {{- range $caller := $config.allowedCallers }}
              - "cluster.local/ns/{{ $.Values.namespace }}/sa/{{ $caller }}-sa"
            {{- end }}
      to:
        - operation:
            methods: ["GET", "POST"]
{{- end }}
{{- end }}
{{- end }}
