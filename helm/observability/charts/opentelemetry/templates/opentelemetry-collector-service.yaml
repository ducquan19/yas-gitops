apiVersion: v1
kind: Service
metadata:
  name: {{ include "opentelemetry.fullname" . }}
  labels:
    {{- include "opentelemetry.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "opentelemetry.selectorLabels" . | nindent 4 }}
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
