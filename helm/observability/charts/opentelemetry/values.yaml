fullnameOverride: opentelemetry-collector

image:
  repository: otel/opentelemetry-collector
  tag: 0.102.1

opentelemetryCollectorConfig:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch: {}

  exporters:
    debug: {}

    otlphttp:
      endpoint: http://observability-tempo:4318

  service:
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - batch
        exporters:
          - debug
          - otlphttp
