apiVersion: v2
name: infrastructure
description: A Helm chart for YAS Infrastructure Dependencies
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: keycloak
    version: "21.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: keycloak.enabled
  - name: kafka
    version: "29.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
  - name: redis
    version: "19.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: elasticsearch
    version: "21.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: elasticsearch.enabled
